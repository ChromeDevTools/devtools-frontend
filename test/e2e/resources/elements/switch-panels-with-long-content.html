<!DOCTYPE html>
<div>
  <div id="inspected">Inspected Node</div>
</div>

<div id="long-list"></div>
<script>
  const list = document.getElementById('long-list');
  for (let i = 0; i < 200; i++) {
    const item = document.createElement('div');
    item.className = 'row';
    item.textContent = `row-${i}`;
    list.appendChild(item);
  }
</script>
